# Clockwork skin — M11 P2. PLACEHOLDER palette (tune to the wallpaper later).
[meta]
schema = 1
id = "clockwork"
name = "Clockwork"
description = "Warm brass-and-sepia skin with a bunch of clocks in the background."
version = "0.1.0"
author = "eKplorer"

[palette]
window           = "#0d0a03"
window_text      = "#ece4cf"
base             = "#15110a"
text             = "#f0e8d6"
alternate_base   = "#1d170b"
mid              = "#6e5d22"   # amber-muted border
dark             = "#070500"
highlight        = "#c79a22"   # gold selection
highlighted_text = "#1a1400"   # dark text on gold white would glare

[background]
image = "bg.png"
scaling = "cover"
anchor = "center"
opacity = 1.0

[[attribution]]
author = "Mental Picture Studio"
source = "Photo · treatment by Devyn Genjima"
