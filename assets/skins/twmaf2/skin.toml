# TWMAF 2 skin — M11 P2. PLACEHOLDER palette (tune to the wallpaper later).
[meta]
schema = 1
id = "twmaf2"
name = "TWMAF 2"
description = "Stark blacks and reds, in promotion of SECURITY ISSUE: Two Wars Middle A Fence, the transgressive crime novel. Alternate variant."
version = "0.1.0"
author = "eKplorer"

[palette]
window           = "#1c0000"
window_text      = "#e8e0e0"
base             = "#100a0b"
text             = "#fc0000"
alternate_base   = "#180e0f"   # sidebar / breadcrumb / modal bars
mid              = "#b81d1d"   # borders + muted text, red-grey
dark             = "#b81d1d"
highlight        = "#b81d1d"   # selection — vivid red (art reds were too dark to use raw)
highlighted_text = "#350101"

[background]
image = "bg.png"
scaling = "cover"
anchor = "center"
opacity = 0.6

[[attribution]]
author = "Devyn Genjima"
source = "Original work"
