# eK-imp skin — M11 P2. PLACEHOLDER palette (tune to the wallpaper later).
[meta]
schema = 1
id = "ek-imp"
name = "eK-imp"
description = "Neutral dark skin paired with the eK-imp wallpaper. Inspired by GIMP's BG."
version = "0.1.0"
author = "eKplorer"

[palette]
window           = "#3a3a3a"
window_text      = "#ededed"
base             = "#444444"
text             = "#f0f0f0"
alternate_base   = "#4d4d4d"
mid              = "#8c8c8c"   # deliberately LIGHTER grey borders, per your ask
dark             = "#2a2a2a"
highlight        = "#5a7491"   # quiet slate-blue selection, stays neutral
highlighted_text = "#ffffff"

[background]
image = "bg.png"
scaling = "cover"
anchor = "center"
opacity = 0.3

[[attribution]]
author = "Devyn Genjima"
source = "folder base: iconpacks.net"
